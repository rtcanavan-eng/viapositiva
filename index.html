<!DOCTYPE html>
<html lang="en">
<head>

  <title>Via Positiva</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      background: #ffffff;
      color: #143d2a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 760px;
      padding: 40px;

      letter-spacing: 8px;

    }
    h2 {

      font-weight: 400;
      margin-bottom: 40px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
    }
    .line {
      width: 80px;
      height: 1px;
      background: #c9a646;
      margin: 30px auto;
    }
    a {
      color: #143d2a;
      text-decoration: none;
    }

</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Via Positiva Logo" width="600">   
    <div class="line"></div>

    <p>Launching soon.</p>
    <p><a href="mailto:info@viapositiva.org">info@viapositiva.org</a></p>

</html>
